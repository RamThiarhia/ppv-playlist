name: Pre-Game Scheduler

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for upcoming games and trigger playlist update if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json
          import subprocess
          import sys
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          # ── config ────────────────────────────────────────────────────────
          TRIGGER_WINDOW_MINUTES = 50
          TRIGGER_EARLY_MINUTES  = 65
          PHT = timezone(timedelta(hours=8))
          REPO = "${{ github.repository }}"

          # ── load schedule.json ────────────────────────────────────────────
          schedule_file = Path("schedule.json")
          if not schedule_file.exists():
              print("No schedule.json found — skipping.")
              sys.exit(0)

          try:
              games = json.loads(schedule_file.read_text())
          except Exception as e:
              print(f"Could not parse schedule.json: {e}")
              sys.exit(0)

          if not games:
              print("schedule.json is empty — no upcoming games.")
              sys.exit(0)

          # ── load triggered flags ──────────────────────────────────────────
          flags_file = Path(".triggered_games.json")
          try:
              triggered = json.loads(flags_file.read_text()) if flags_file.exists() else {}
          except Exception:
              triggered = {}

          # ── check each game ───────────────────────────────────────────────
          now_utc = datetime.now(tz=timezone.utc)
          now_pht = now_utc.astimezone(PHT)

          print(f"UTC: {now_utc.strftime('%Y-%m-%d %H:%M:%S')}")
          print(f"PHT: {now_pht.strftime('%Y-%m-%d %H:%M:%S')} (UTC+8)")
          print(f"Checking {len(games)} scheduled game(s)...")
          print("-" * 50)

          trigger_game = None
          for game in games:
              try:
                  # Auto-generate ID from starts_at_iso
                  game_id    = game["starts_at_iso"].replace(":", "-").replace("+", "_")
                  starts_at  = datetime.fromisoformat(game["starts_at_iso"])
                  starts_pht = starts_at.astimezone(PHT)
                  mins_until = (starts_at - now_utc).total_seconds() / 60

                  print(f"  {game['name']}")
                  print(f"    starts: {starts_pht.strftime('%m/%d %I:%M %p PHT')} "
                        f"({mins_until:+.1f} min from now)")
                  print(f"    id: {game_id}")

                  # Already triggered for this game?
                  if triggered.get(game_id):
                      print(f"    --> already triggered, skipping")
                      continue

                  # Fire only in the 50–65 minute window (catches one 15-min poll)
                  if TRIGGER_WINDOW_MINUTES <= mins_until <= TRIGGER_EARLY_MINUTES:
                      trigger_game = game
                      trigger_game["_id"] = game_id
                      print(f"    --> IN WINDOW (~50 min before) — will trigger!")
                      break
                  elif mins_until < 0:
                      print(f"    --> already started, skipping")
                  else:
                      print(f"    --> not yet in window ({mins_until:.1f} min away)")

              except Exception as e:
                  print(f"  Error parsing game entry: {e}")

          print("-" * 50)

          # ── trigger if needed ─────────────────────────────────────────────
          if trigger_game:
              game_id = trigger_game["_id"]
              print(f"\nTriggering playlist update for: {trigger_game['name']}")
              result = subprocess.run(
                  [
                      "gh", "workflow", "run",
                      "update-playlist.yml",
                      "--repo", REPO,
                  ],
                  capture_output=True,
                  text=True,
              )
              print(result.stdout)
              if result.returncode != 0:
                  print(f"ERROR triggering workflow: {result.stderr}")
                  sys.exit(1)

              # ── save flag so it never fires again for this game ───────────
              triggered[game_id] = now_utc.isoformat()
              flags_file.write_text(json.dumps(triggered, indent=2))

              subprocess.run(["git", "config", "user.name",  "github-actions[bot]"], check=True)
              subprocess.run(["git", "config", "user.email", "github-actions[bot]@users.noreply.github.com"], check=True)
              subprocess.run(["git", "add", str(flags_file)], check=True)
              subprocess.run(["git", "commit", "-m", f"chore: mark {game_id} as triggered"], check=True)
              subprocess.run(["git", "push"], check=True)

              print("Playlist update triggered successfully (once).")
          else:
              print("\nNo games in the trigger window — nothing to do.")
          EOF
