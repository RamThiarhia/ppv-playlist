name: Update PPV Playlist

on:
  schedule:
    # PHT = UTC+8. These fixed runs happen at:
    # 12:00 AM PHT = 16:00 UTC (previous day)
    # 03:00 AM PHT = 19:00 UTC (previous day)
    # 06:00 AM PHT = 22:00 UTC (previous day)
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    concurrency:
      group: playlist-update
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated playlist, schedule, and scheduler cron
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u schedule.json .github/workflows/scheduler.yml
          git diff --cached --quiet || git commit -m "Update playlist + scheduler cron [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
